spring.application.name=logistica-notificaciones
# Puerto WebSocket
server.port=${PORT:8796}

# PostgreSQL
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/logistica_notificaciones}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:logistica}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:logistica}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Kafka (Event Bus)
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
app.kafka.topic=${KAFKA_TOPIC:logistica.eventbus}
spring.kafka.consumer.group-id=${KAFKA_CONSUMER_GROUP:logistica-notificaciones}
spring.kafka.consumer.auto-offset-reset=earliest

# WebSocket
app.ws.allowed-origins=${WS_ALLOWED_ORIGINS:*}

spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}
app.mail.from=${MAIL_FROM:no-reply@logistica.local}

management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true

springdoc.swagger-ui.path=/swagger-ui
springdoc.swagger-ui.operationsSorter=method
springdoc.api-docs.path=/v3/api-docs