spring.application.name=logistica-seguimiento
server.port=${PORT:8082}

# PostgreSQL
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/logistica_seguimiento}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:logistica}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:logistica}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JWT (mismo secreto que logistica-auth / logistica-envios)
app.jwt.secret=${APP_JWT_SECRET}

# Kafka (Event Bus)
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
app.kafka.topic=${KAFKA_TOPIC:logistica.eventbus}

management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true

springdoc.swagger-ui.path=/swagger-ui
springdoc.swagger-ui.operationsSorter=method
springdoc.api-docs.path=/v3/api-docs
