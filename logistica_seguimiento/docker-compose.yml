services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: logistica_seguimiento
      POSTGRES_USER: logistica
      POSTGRES_PASSWORD: logistica
    ports:
      - "5435:5432"

  app:
    build: .
    environment:
      PORT: 8082
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/logistica_seguimiento
      SPRING_DATASOURCE_USERNAME: logistica
      SPRING_DATASOURCE_PASSWORD: logistica
      APP_JWT_SECRET: dev-jwt-secret-change-in-production-min-32-chars!!
      KAFKA_BOOTSTRAP_SERVERS: host.docker.internal:9092
      KAFKA_TOPIC: logistica.eventbus
    ports:
      - "8082:8082"
    depends_on:
      - db
