spring.application.name=logistica-envios
server.port=${PORT:8081}

# Mismas reglas que logistica-auth; APP_JWT_SECRET idéntico al del auth si usas JWT entre APIs
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/logistica_envios}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:logistica}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:logistica}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

app.jwt.secret=${APP_JWT_SECRET:30CB2BC0F0F0DDE92B2CC1E9A06B3734}

management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
